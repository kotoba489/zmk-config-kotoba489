name: Build ZMK Firmware
on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize and Update
        run: |
          west init -l .
          west update

      - name: Build Firmware (Absolute Environment)
        run: |
          # 1. 前回のログで確定したパスを直接利用
          APP_PATH="/__w/zmk-config-kotoba489/zmk/app"
          ZEPHYR_PATH="/__w/zmk-config-kotoba489/zephyr"
          
          # 2. Zephyrの環境をエクスポート
          west zephyr-export
          
          # 3. 左手ビルド (全てのパスを引数として直接渡します)
          west build -s "$APP_PATH" -b xiao_ble -- \
            -DSHIELD=totem_left \
            -DZMK_CONFIG="$GITHUB_WORKSPACE/config" \
            -DZephyr_DIR="$ZEPHYR_PATH/share/zephyr-package/cmake" \
            -DZephyr-sdk_DIR=/opt/zephyr-sdk/cmake

          cp build/zephyr/zmk.uf2 ./totem_left.uf2
          
          # 4. 右手ビルド
          rm -rf build
          west build -s "$APP_PATH" -b xiao_ble -- \
            -DSHIELD=totem_right \
            -DZMK_CONFIG="$GITHUB_WORKSPACE/config" \
            -DZephyr_DIR="$ZEPHYR_PATH/share/zephyr-package/cmake" \
            -DZephyr-sdk_DIR=/opt/zephyr-sdk/cmake

          cp build/zephyr/zmk.uf2 ./totem_right.uf2

      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: totem_firmware
          path: ./*.uf2
