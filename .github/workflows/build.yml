name: Build ZMK Firmware
on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Force Clone ZMK Main (確実な方法)
        # west update に頼らず、ZMK公式リポジトリを直接持ってきます
        run: |
          git clone https://github.com/zmkfirmware/zmk.git zmk_core
          cd zmk_core
          west init -l app/
          west update

      - name: Export Zephyr env
        run: west zephyr-export

      - name: Build Firmware
        run: |
          # 確実に存在する zmk_core/app を指定
          APP_PATH="zmk_core/app"
          
          echo "Using APP_PATH: $APP_PATH"
          
          # 左手ビルド
          west build -s "$APP_PATH" -b seeeduino_xiao_ble -- -DSHIELD=totem_left -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"
          cp build/zephyr/zmk.uf2 totem_left.uf2
          
          # 右手ビルド
          rm -rf build
          west build -s "$APP_PATH" -b seeeduino_xiao_ble -- -DSHIELD=totem_right -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"
          cp build/zephyr/zmk.uf2 totem_right.uf2

      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: totem_firmware
          path: ./*.uf2
