name: Build
on: [push, pull_request, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: West Init
        run: west init -l .
      - name: West Update
        run: west update
      - name: West Zephyr export
        run: west zephyr-export
      - name: Build and Copy
        run: |
          # appフォルダを強制的に探し出す
          REAL_APP_PATH=$(find . -name "app" -type d -print -quit)
          echo "Real app path found at: $REAL_APP_PATH"
          
          # 左手ビルド
          west build -s "$REAL_APP_PATH" -b seeeduino_xiao_ble -- -DSHIELD=totem_left -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"
          cp build/zephyr/zmk.uf2 totem_left.uf2
          
          # 右手ビルド
          rm -rf build
          west build -s "$REAL_APP_PATH" -b seeeduino_xiao_ble -- -DSHIELD=totem_right -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"
          cp build/zephyr/zmk.uf2 totem_right.uf2
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: totem_firmware
          path: "*.uf2"
