name: Build ZMK Firmware
on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize and Update
        run: |
          west init -l .
          west update
          # 前回判明した「正しい場所」を環境変数にセット
          echo "ZEPHYR_BASE=$GITHUB_WORKSPACE/zephyr" >> $GITHUB_ENV

      - name: Build Firmware (Absolute Path)
        run: |
          # 3分11秒のログで成功した「真のパス」を直接指定します
          # 前回のログで「Found REAL_APP_PATH at: /__w/zmk-config-kotoba489/zmk/app」と出た場所です
          APP_PATH="/__w/zmk-config-kotoba489/zmk/app"
          
          # Zephyrのエクスポート（場所を固定）
          west zephyr-export
          
          # 左手ビルド
          # $GITHUB_WORKSPACE は「/__w/zmk-config-kotoba489/zmk-config-kotoba489」を指すため
          # configの場所もそれに合わせて修正
          west build -s "$APP_PATH" -b seeeduino_xiao_ble -- -DSHIELD=totem_left -DZMK_CONFIG="$GITHUB_WORKSPACE/config"
          cp build/zephyr/zmk.uf2 ./totem_left.uf2
          
          # 右手ビルド
          rm -rf build
          west build -s "$APP_PATH" -b seeeduino_xiao_ble -- -DSHIELD=totem_right -DZMK_CONFIG="$GITHUB_WORKSPACE/config"
          cp build/zephyr/zmk.uf2 ./totem_right.uf2

      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: totem_firmware
          path: ./*.uf2
