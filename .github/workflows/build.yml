name: Build ZMK Firmware
on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize workspace (west init)
        # フォルダを指定して初期化します
        run: west init -l .

      - name: Update modules (west update)
        run: west update

      - name: Export Zephyr env
        run: west zephyr-export

      - name: Build Firmware
        run: |
          # west.yml の設定に関わらず、ZMK本体の CMakeLists.txt がある場所を特定
          # 通常は zmk/app か app です
          if [ -f "zmk/app/CMakeLists.txt" ]; then
            APP_PATH="zmk/app"
          elif [ -f "app/CMakeLists.txt" ]; then
            APP_PATH="app"
          else
            # 執念で CMakeLists.txt を探し出します
            APP_PATH=$(find . -path "*/app/CMakeLists.txt" | sed 's/\/CMakeLists.txt//' | head -n 1)
          fi

          echo "Found CMakeLists.txt at: $APP_PATH"

          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Could not find ZMK app directory."
            exit 1
          fi

          # 左手ビルド
          west build -s "$APP_PATH" -b seeeduino_xiao_ble -- -DSHIELD=totem_left -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"
          cp build/zephyr/zmk.uf2 totem_left.uf2

          # 右手ビルド
          rm -rf build
          west build -s "$APP_PATH" -b seeeduino_xiao_ble -- -DSHIELD=totem_right -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"
          cp build/zephyr/zmk.uf2 totem_right.uf2

      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: totem_firmware
          path: ./*.uf2
