name: Build ZMK Firmware
on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize and Update
        run: |
          west init -l .
          west update
          # SDKとツールチェーンの場所を強制的に教え込みます
          echo "ZEPHYR_SDK_INSTALL_DIR=/opt/zephyr-sdk" >> $GITHUB_ENV
          echo "ZEPHYR_TOOLCHAIN_VARIANT=zephyr" >> $GITHUB_ENV

      - name: Build Firmware
        run: |
          west zephyr-export
          APP_PATH="/__w/zmk-config-kotoba489/zmk/app"
          
          # CXX（C++）コンパイラを明示的に指定して、エラーを物理的に回避します
          west build -s "$APP_PATH" -b seeeduino_xiao_ble -- \
            -DSHIELD=totem_left \
            -DZMK_CONFIG="$GITHUB_WORKSPACE/config" \
            -DCMAKE_CXX_COMPILER=arm-none-eabi-g++ \
            -DCMAKE_C_COMPILER=arm-none-eabi-gcc

          cp build/zephyr/zmk.uf2 ./totem_left.uf2
          
          rm -rf build
          west build -s "$APP_PATH" -b seeeduino_xiao_ble -- \
            -DSHIELD=totem_right \
            -DZMK_CONFIG="$GITHUB_WORKSPACE/config" \
            -DCMAKE_CXX_COMPILER=arm-none-eabi-g++ \
            -DCMAKE_C_COMPILER=arm-none-eabi-gcc

          cp build/zephyr/zmk.uf2 ./totem_right.uf2

      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: totem_firmware
          path: ./*.uf2
