on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    uses: zmkfirmware/zmk/.github/workflows/build-user-config.yml@main
    with:
      build_matrix_path: ".github/workflows/build.yml"
      config_path: "config"

# ここから下がビルドの対象（行列）の指定です
      build_matrix: |
        include:
          - board: seeeduino_xiao_ble
            shield: k_grid_left
          - board: seeeduino_xiao_ble
            shield: k_grid_right
