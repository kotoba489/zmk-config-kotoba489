name: Build ZMK Firmware
on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize and Update
        run: |
          west init -l .
          west update
          # 絶対パスでZEPHYR_BASEを固定
          echo "ZEPHYR_BASE=$GITHUB_WORKSPACE/zephyr" >> $GITHUB_ENV

      - name: Build Firmware
        run: |
          # 1. Zephyrの環境をエクスポート
          west zephyr-export
          
          # 2. 正しいアプリのパス（前回の成功例に基づく）
          APP_PATH="/__w/zmk-config-kotoba489/zmk/app"
          
          # 3. 左手ビルド
          # ツールチェーンの場所を明示的に指定して、コンパイラ迷子を防ぎます
          west build -s "$APP_PATH" -b seeeduino_xiao_ble -- -DSHIELD=totem_left -DZMK_CONFIG="$GITHUB_WORKSPACE/config"
          cp build/zephyr/zmk.uf2 ./totem_left.uf2
          
          # 4. 右手ビルド
          rm -rf build
          west build -s "$APP_PATH" -b seeeduino_xiao_ble -- -DSHIELD=totem_right -DZMK_CONFIG="$GITHUB_WORKSPACE/config"
          cp build/zephyr/zmk.uf2 ./totem_right.uf2

      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: totem_firmware
          path: ./*.uf2
