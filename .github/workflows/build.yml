name: Build

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: West Init
        run: west init -l config

      - name: West Update
        run: west update

      - name: West Zephyr export
        run: west zephyr-export

      # 1. Leftのビルド
      - name: Build Left
        run: west build -s zmk/app -b xiao_ble -- -DSHIELD=k_grid_left -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"
      - name: Rename Left
        run: mv build/zephyr/zmk.uf2 k_grid_left.uf2

      # 2. Rightのビルド
      - name: Build Right
        run: west build -Pr zmk/app -b xiao_ble -- -DSHIELD=k_grid_right -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"
      - name: Rename Right
        run: mv build/zephyr/zmk.uf2 k_grid_right.uf2

      # 3. Settings Resetのビルド (Bluetoothのペアリング情報を消去する用)
      - name: Build Reset
        run: west build -Pr zmk/app -b xiao_ble -- -DSHIELD=settings_reset -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"
      - name: Rename Reset
        run: mv build/zephyr/zmk.uf2 settings_reset.uf2

      # 4. まとめてアップロード
      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: k_grid_firmware
          path: |
            k_grid_left.uf2
            k_grid_right.uf2
            settings_reset.uf2
